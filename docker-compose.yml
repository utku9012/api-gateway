services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    env_file:
      - .env
    ports:
      - "4000:4000"
    volumes:
      - ./config.yaml:/app/config.yaml
  orchestrator:
    build: ./orchestrator
    env_file:
      - .env
    environment:
      - LLM_GATEWAY_URL=http://litellm:4000/v1/chat/completions
    depends_on:
      - litellm
    ports:
      - "8000:8000"